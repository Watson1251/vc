<!-- Show router only after profile finishes loading -->
<router-outlet *ngIf="!(auth.isProfileLoading$ | async); else loading"></router-outlet>

<ng-template #loading>
    <div class="w-100 d-flex align-items-center justify-content-center py-5 text-muted">
        جاري تحميل الملف الشخصي…
    </div>
</ng-template>
